  <path d="M664,330 C664,385 966,385 966,268" stroke="#0e7490" stroke-width="1.2" fill="none" opacity="0.35" stroke-dasharray="5 3" marker-end="url(#arr)"/>
  <text x="815" y="396" text-anchor="middle" fill="#0e7490" font-size="8" opacity="0.5" font-style="italic">session → recall (direct)</text>

