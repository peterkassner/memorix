    <!-- Observation → Dedup (down far) -->
    <path d="M664,128 C690,128 706,314 728,314"/>
    <!-- Reasoning → Formation (up) -->
    <path d="M664,190 C686,190 706,128 728,128"/>
    <!-- Reasoning → Graph (down) -->
    <path d="M664,190 C686,190 706,252 728,252"/>
    <!-- Git Memory → Embedding (up) -->
    <path d="M664,252 C686,252 706,190 728,190" opacity="0.6" stroke-width="1.2"/>
    <!-- Session+Team → Graph (up) -->
    <path d="M664,314 C686,314 706,252 728,252"/>
  </g>

  <!-- === Processing → Consumption === -->
  <g stroke="#86efac" stroke-width="1.2" fill="none" opacity="0.5" marker-end="url(#arr)">
    <!-- Formation → Search (straight) -->
    <path d="M902,128 L966,128"/>
