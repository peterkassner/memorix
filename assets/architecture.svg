  <!-- CONNECTIONS — accurate many-to-many data flow  -->
  <!-- Card Y centers: row1=128, row2=190, row3=252, row4=314 -->
  <!-- ═══════════════════════════════════════════════ -->

  <!-- === Ingress → Runtime (fan-in to servers) === -->
  <g stroke="#a5b4fc" stroke-width="1.2" fill="none" opacity="0.55" marker-end="url(#arr)">
    <!-- Git Hooks → stdio (straight) -->
    <path d="M190,128 L252,128"/>
    <!-- MCP Tools → stdio (curve up) -->
    <path d="M190,190 C212,190 230,128 252,128"/>
    <!-- MCP Tools → HTTP (straight) -->
    <path d="M190,190 L252,190"/>
    <!-- CLI → stdio (curve up) -->
    <path d="M190,252 C216,252 228,128 252,128"/>
    <!-- CLI → HTTP (curve up) -->
    <path d="M190,252 C212,252 230,190 252,190"/>
    <!-- Dashboard → HTTP (curve up) -->
    <path d="M190,314 C212,314 230,190 252,190"/>
  </g>

  <!-- === Runtime internal: servers → binding (convergence) === -->
  <g stroke="#c4b5fd" stroke-width="1.2" fill="none" opacity="0.55">
    <!-- stdio → binding -->
    <path d="M339,154 L339,226" marker-end="url(#arr)"/>
    <!-- HTTP → binding -->
    <path d="M339,216 L339,226" marker-end="url(#arr)"/>
  </g>

  <!-- === Binding → Memory (fan-out from one hub) === -->
  <g stroke="#c4b5fd" stroke-width="1.2" fill="none" opacity="0.55" marker-end="url(#arr)">
    <!-- Binding → Observation (curve up) -->
