    <!-- Binding → Reasoning (curve up slightly) -->
    <path d="M426,252 C450,252 466,190 490,190"/>
    <!-- Binding → Git Memory (straight) -->
    <path d="M426,252 L490,252"/>
    <!-- Binding → Session+Team (curve down) -->
    <path d="M426,252 C450,252 466,314 490,314"/>
  </g>

  <!-- === Memory → Processing (many-to-many) === -->
  <g stroke="#67e8f9" stroke-width="1" fill="none" opacity="0.4" marker-end="url(#arr)">
    <!-- Observation → Formation (straight) -->
    <path d="M664,128 L728,128" opacity="0.6" stroke-width="1.2"/>
    <!-- Observation → Embedding (down) -->
    <path d="M664,128 C686,128 706,190 728,190"/>
    <!-- Observation → Graph (down) -->
